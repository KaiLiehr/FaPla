openapi: 3.0.3
info:
  title: FAPLA API
  version: 1.0.0
  description: Backend of the FAPLA(FAmily PLAnner) app that manages your household,
    tasks, recipes,...
paths:
  /api/token/:
    post:
      operationId: api_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: api_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /households/:
    get:
      operationId: households_list
      tags:
      - households
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Household'
          description: ''
  /households/{id}/:
    get:
      operationId: households_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - households
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
          description: ''
    put:
      operationId: households_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - households
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Household'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Household'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Household'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
          description: ''
    patch:
      operationId: households_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - households
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedHousehold'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedHousehold'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedHousehold'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
          description: ''
    delete:
      operationId: households_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - households
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /my-households/:
    get:
      operationId: my_households_list
      tags:
      - my-households
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Household'
          description: ''
    post:
      operationId: my_households_create
      tags:
      - my-households
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Household'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Household'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Household'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
          description: ''
  /my-households/create/:
    post:
      operationId: my_households_create_create
      tags:
      - my-households
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Household'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Household'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Household'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
          description: ''
  /users/:
    get:
      operationId: users_list
      tags:
      - users
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
          description: ''
components:
  schemas:
    Household:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        created_at:
          type: string
          format: date-time
          readOnly: true
        creator:
          type: integer
          nullable: true
        members:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
          readOnly: true
      required:
      - created_at
      - id
      - members
      - name
    Membership:
      type: object
      properties:
        member_id:
          type: integer
        member_name:
          type: string
        joined_at:
          type: string
          format: date-time
          readOnly: true
        inviter:
          type: integer
          nullable: true
      required:
      - joined_at
      - member_id
      - member_name
    PatchedHousehold:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        created_at:
          type: string
          format: date-time
          readOnly: true
        creator:
          type: integer
          nullable: true
        members:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
          readOnly: true
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        display_name:
          type: string
          maxLength: 200
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        last_login:
          type: string
          format: date-time
          nullable: true
      required:
      - display_name
      - id
      - username
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
